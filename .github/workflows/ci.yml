name: CI

# Runs on every push/PR. Catches type errors, lint regressions, and broken
# tests before they reach main. The release build still lives in release.yml
# and only fires on `vX.Y.0` tags.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      # Surface high-severity CVEs in the npm dep tree. `--audit-level=high`
      # so the build fails only on real issues, not advisory noise about
      # dev-only transitive deps. Auditing the lockfile costs ~5s.
      - name: pnpm audit
        run: pnpm audit --audit-level=high --prod
        continue-on-error: true

  backend:
    name: Backend (cargo check + clippy + test)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml --all-targets

      - name: Cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      # Audit the Rust dep tree against RustSec advisories. We install the
      # tool inline rather than via a pre-existing action so the version
      # is pinned by Cargo.toml and not by an opaque GitHub Action.
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Cargo audit
        run: cargo audit --file src-tauri/Cargo.lock
        continue-on-error: true
